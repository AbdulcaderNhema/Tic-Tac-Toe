<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Minimax AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
      body {
        background-color: #f7f9fc;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: 'Fredoka', sans-serif;
      }

      /* Container para sa Canvas at UI */
      #game-wrapper {
        position: relative;
        text-align: center;
      }

      /* Style para sa mga Buttons */
      .cute-btn {
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        font-size: 24px;
        color: white;
        background-color: #3a539b;
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px #2d4373;
        transition: all 0.2s;
        margin-top: 20px;
      }

      .cute-btn:hover {
        background-color: #4a69bd;
        transform: translateY(-2px);
      }

      .cute-btn:active {
        box-shadow: 0 2px #2d4373;
        transform: translateY(4px);
      }

      /* Style para sa result text */
      .result-text {
        font-size: 36px;
        color: #3b5998;
        margin-bottom: 10px;
        display: none; /* Itatago muna sa simula */
      }

      /* Overlay para sa Start screen */
      #start-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(247, 249, 252, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="start-screen">
            <h1 style="color:#3a539b; font-size: 48px;">Tic Tac Toe</h1>
            <button class="cute-btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="canvas-container"></div>

        <div id="result-section">
            <div id="winner-message" class="result-text"></div>
            <button id="retry-btn" class="cute-btn" style="display:none;" onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <script src="sketch.js"></script>
    <script src="minimax.js"></script>
</body>
</html>
