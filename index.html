<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Minimax AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
      body {
        background-color: #f7f9fc; /* Light background gaya ng nasa pic */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: 'Fredoka', sans-serif;
      }
      /* Estilo para sa text container na lalabas sa ibaba ng canvas */
      .result-text {
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        font-size: 32px;
        color: #3b5998; /* Cute Blue Color */
        text-align: center;
        margin-top: 20px;
        background-color: #e2ecf7;
        padding: 10px 20px;
        border-radius: 15px;
        border: 2px solid #b0c4de;
        display: inline-block;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }
    </style>
</head>
<body>
    <script src="sketch.js"></script>
    <script src="minimax.js"></script>
</body>
</html>
